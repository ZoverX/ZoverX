name: Update LoL Stats

on:
  # GitHub Actions cron uses UTC, not Europe/London directly.
  #
  # UK local time changes during daylight saving:
  # - winter: 9am UK = 09:00 UTC
  # - summer: 9am UK = 08:00 UTC
  #
  # To handle that, we schedule both times and then use a small gate step
  # below to continue only when the current Europe/London local hour is 09.
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"

  # This lets you run the workflow manually from the GitHub Actions tab.
  workflow_dispatch:

# The workflow needs permission to push the refreshed SVG back to the repo.
permissions:
  contents: write

jobs:
  build-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents into the runner so later steps
        # can read files and commit changes.
        uses: actions/checkout@v4

      - name: Decide whether this is 9am UK time
        id: uk_time_gate
        shell: bash
        run: |
          # Manual runs should always continue.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Convert the runner time to Europe/London and only continue at 09.
          current_hour=$(TZ=Europe/London date +%H)
          if [ "$current_hour" = "09" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.uk_time_gate.outputs.should_run == 'true'
        # Install the requested Python version on the GitHub runner.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.uk_time_gate.outputs.should_run == 'true'
        # This project keeps dependencies minimal: just requests.
        run: python -m pip install --upgrade pip requests

      - name: Generate stats SVG
        if: steps.uk_time_gate.outputs.should_run == 'true'
        # GitHub injects encrypted secrets as environment variables at runtime.
        # The Python script reads these through os.getenv(...).
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          RIOT_REGION: ${{ secrets.RIOT_REGION }}
          RIOT_PLATFORM: ${{ secrets.RIOT_PLATFORM }}
          RIOT_GAME_NAME: ${{ secrets.RIOT_GAME_NAME }}
          RIOT_TAG_LINE: ${{ secrets.RIOT_TAG_LINE }}
        run: python scripts/lol_stats.py

      - name: Commit updated SVG
        if: steps.uk_time_gate.outputs.should_run == 'true'
        # This action creates a commit only if assets/lol-stats.svg changed.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh League stats card"
          file_pattern: assets/lol-stats.svg
